<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f766e" />
  <title>Deen Academy — Offline</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Amiri:wght@700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(160deg, #0f766e 0%, #0d5c56 50%, #134e4a 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 420px; }
    .icon-wrapper {
      width: 96px; height: 96px;
      margin: 0 auto 2rem;
      background: rgba(255,255,255,0.12);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
    }
    .icon-wrapper svg { width: 48px; height: 48px; stroke: #d4a843; fill: none; stroke-width: 1.5; }
    h1 {
      font-family: 'Amiri', serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #fef3c7;
    }
    p {
      font-size: 1.05rem;
      line-height: 1.6;
      opacity: 0.85;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.15s;
    }
    .retry-btn:hover { background: rgba(255,255,255,0.22); transform: translateY(-1px); }
    .retry-btn:active { transform: translateY(0); }
    .retry-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
    .decorative {
      margin-top: 3rem;
      font-family: 'Amiri', serif;
      font-size: 1.15rem;
      opacity: 0.5;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <svg viewBox="0 0 24 24"><path d="M2 12C2 6.5 6.5 2 12 2a10 10 0 0 1 8 4"/><path d="M2 12a10 10 0 0 0 17.3 6.8"/><line x1="12" y1="2" x2="12" y2="6"/><circle cx="12" cy="12" r="1"/><path d="M17 8l-5 4"/><line x1="1" y1="1" x2="23" y2="23" stroke-linecap="round"/></svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — reconnect and pick up right where you left off.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Try Again
    </button>
    <div class="decorative">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div>
  </div>
</body>
</html>
